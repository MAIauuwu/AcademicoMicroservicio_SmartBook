spring:
  application:
    name: academico-microservicio

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8084

---

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/academico_db
    username: postgres
    password: postgres

---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://academico-db:5432/academico_db
    username: postgres
    password: postgres
